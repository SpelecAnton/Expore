<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXPORE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #fff;
      font-family: "Share Tech Mono", monospace;
      font-size: 14px; gap: 16px; z-index: 100;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #progress-bar {
      width: 260px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%; background: #fff;
      transition: width 0.2s;
    }
    #fade {
      position: fixed; inset: 0; background: #000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s; z-index: 50;
    }
    #fade.out { opacity: 1; }
    #picker {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #fff;
      font-family: "Share Tech Mono", monospace;
      gap: 24px; z-index: 200;
    }
    #picker h1 { font-size: 22px; letter-spacing: 0.15em; opacity: 0.9; }
    #picker p  { font-size: 12px; opacity: 0.45; max-width: 340px; text-align: center; line-height: 1.7; }
    .pick-row { display: flex; flex-direction: column; gap: 8px; width: 320px; }
    .pick-label { font-size: 11px; opacity: 0.5; letter-spacing: 0.1em; text-transform: uppercase; }
    .pick-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; color: #fff;
      font-family: "Share Tech Mono", monospace;
      font-size: 13px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .pick-btn:hover { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.25); }
    .pick-btn.ok { border-color: rgba(255,255,255,0.4); }
    .pick-btn .icon { font-size: 18px; }
    .pick-btn .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #start-btn {
      margin-top: 8px; padding: 11px 36px;
      background: #fff; color: #000;
      border: none; border-radius: 6px;
      font-family: "Share Tech Mono", monospace;
      font-size: 14px; cursor: pointer;
      letter-spacing: 0.08em; transition: opacity 0.15s;
    }
    #start-btn:disabled { opacity: 0.25; cursor: default; }
    #start-btn:not(:disabled):hover { opacity: 0.85; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

<div id="picker">
  <h1>EXPORE</h1>
  <div class="pick-row">
    <div class="pick-label">BSP mapa *</div>
    <button class="pick-btn" id="btn-bsp" onclick="document.getElementById('in-bsp').click()">
      <span class="icon">🗺️</span>
      <span class="name" id="lbl-bsp">Vybrat soubor .bsp…</span>
    </button>
    <input type="file" id="in-bsp" accept=".bsp">
  </div>
  <div class="pick-row">
    <div class="pick-label">Složka s texturami (volitelné)</div>
    <button class="pick-btn" id="btn-tex" onclick="document.getElementById('in-tex').click()">
      <span class="icon">🖼️</span>
      <span class="name" id="lbl-tex">Vybrat složku textur…</span>
    </button>
    <input type="file" id="in-tex" webkitdirectory multiple>
  </div>
  <button id="start-btn" disabled>Spustit →</button>
  <p>Soubory zůstávají v prohlížeči — nic se nenahrává na internet.</p>
</div>

<div id="loading" style="display:none">
  <div>Loading Map…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<div id="fade"></div>
<canvas id="c"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// TEXTURE INTERCEPT — musí běžet PŘED importem engine.js
//
// Problém: ImageDecoder volá fetch() interně v prohlížeči (C++ vrstva),
// monkey-patch window.fetch ho nezachytí.
//
// Řešení: textureBase = '' (prázdný string), ale přepíšeme ImageDecoder
// a THREE.TextureLoader tak, aby URL začínající "local-tex:///" přeložily
// na blob: URL které jsme předpřipravili při výběru složky.
// ═══════════════════════════════════════════════════════════════════════════

// Globální mapa:  "basename_lowercase" → blob:URL  (např. "fire1" → "blob:...")
// Klíč je BEZ přípony — hledáme best-match přes přípony
window._localTexMap = new Map(); // "fire1.gif" → "blob:...", "fire1.png" → "blob:..."

const LOCAL_PREFIX = 'local-tex:///';

// ── Patch: window.fetch ────────────────────────────────────────────────────
const _origFetch = window.fetch.bind(window);

function resolveLocalUrl(url) {
  if (!url || !url.startsWith(LOCAL_PREFIX)) return null;
  const path = url.slice(LOCAL_PREFIX.length).toLowerCase(); // "fire1.gif"
  const m    = window._localTexMap;

  // 1. Přesná shoda: "fire1.gif"
  if (m.has(path)) return m.get(path);

  // 2. Jen basename: "textures/fire1.gif" → "fire1.gif"
  const base = path.split('/').pop();
  if (m.has(base)) return m.get(base);

  // 3. Libovolná přípona pro stejný stem
  const stem = path.replace(/\.[^.]+$/, '');
  const baseStem = base.replace(/\.[^.]+$/, '');
  for (const [k, v] of m) {
    const kstem = k.replace(/\.[^.]+$/, '');
    if (kstem === stem || kstem === baseStem) return v;
  }

  return null;
}

window.fetch = async function(input, init) {
  const url = typeof input === 'string' ? input
            : (input instanceof Request ? input.url : String(input));

  if (url && url.startsWith(LOCAL_PREFIX)) {
    const blobUrl = resolveLocalUrl(url);

    if (!blobUrl) return new Response(null, { status: 404 });

    if (init && init.method === 'HEAD') {
      const ext = url.split('.').pop().toLowerCase();
      const mime = { gif:'image/gif', avif:'image/avif', webp:'image/webp',
                     png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg' };
      return new Response(null, {
        status: 200,
        headers: { 'Content-Type': mime[ext] || 'application/octet-stream' },
      });
    }

    return _origFetch(blobUrl, init);
  }

  return _origFetch(input, init);
};

// ── Patch: ImageDecoder ────────────────────────────────────────────────────
// ImageDecoder přijímá { data: ReadableStream | ... }
// Pokud mu dáme blob URL místo local-tex://, funguje normálně.
// Ale bsp_loader.js si staví data stream sám z fetch() výsledku —
// takže fetch patch stačí pro tělo, ale ImageDecoder dostane stream
// z blob URL přes náš fetch → OK.
//
// Jenže: bsp_loader.js dělá:
//   const response = await fetch(url);          ← náš fetch vrátí fetch(blobUrl)
//   const buffer   = await response.arrayBuffer();
//   new ImageDecoder({ data: new Blob([buffer]).stream(), ... })
// → ImageDecoder dostane Blob stream, NE local-tex:// URL → funguje!
//
// Problém byl že dřív fetch vracel Response z _origFetch(blobUrl) ale
// blobUrl byl undefined protože resolveLocalUrl vracel null.
// Teď máme správnou mapu, takže fetch vrátí správný blob a vše funguje.

console.log('[LocalTex] Fetch intercept aktivní');
</script>

<script type="module">
  import { initEngine } from 'https://spelecanton.github.io/Expore/javascript/engine.js';

  let bspFile = null;

  const startBtn = document.getElementById('start-btn');
  const lblBsp   = document.getElementById('lbl-bsp');
  const lblTex   = document.getElementById('lbl-tex');
  const btnBsp   = document.getElementById('btn-bsp');
  const btnTex   = document.getElementById('btn-tex');

  // ── BSP výběr ────────────────────────────────────────────────────────────
  document.getElementById('in-bsp').addEventListener('change', e => {
    bspFile = e.target.files[0] || null;
    if (bspFile) {
      lblBsp.textContent = bspFile.name;
      btnBsp.classList.add('ok');
      startBtn.disabled = false;
    }
  });

  // ── Textura složka ────────────────────────────────────────────────────────
  // Každý File → blob: URL, uloženo do window._localTexMap
  // Klíč = filename lowercase ("fire1.gif"), value = "blob:..."
  document.getElementById('in-tex').addEventListener('change', e => {
    // Uvolni staré blob URL
    for (const v of window._localTexMap.values()) URL.revokeObjectURL(v);
    window._localTexMap.clear();

    for (const f of e.target.files) {
      const name    = f.name.toLowerCase();                     // "fire1.gif"
      const blobUrl = URL.createObjectURL(f);
      window._localTexMap.set(name, blobUrl);

      // Také relativní cesta bez root složky: "textures/fire1.gif" → "fire1.gif"
      const parts  = f.webkitRelativePath.toLowerCase().split('/');
      const relKey = parts.slice(1).join('/');                  // "fire1.gif" nebo "sub/fire1.gif"
      if (relKey !== name) window._localTexMap.set(relKey, blobUrl);
    }

    const count = e.target.files.length;
    lblTex.textContent = count ? `${count} souborů vybráno` : 'Vybrat složku textur…';
    if (count) btnTex.classList.add('ok');
    console.log('[LocalTex] Indexováno:', window._localTexMap.size, 'záznamů');
    console.log('[LocalTex] Klíče:', [...window._localTexMap.keys()].slice(0, 10));
  });

  // ── BSP → blob URL ────────────────────────────────────────────────────────
  function bspToBlobUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(URL.createObjectURL(
        new Blob([e.target.result], { type: 'application/octet-stream' })
      ));
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  startBtn.addEventListener('click', async () => {
    if (!bspFile) return;

    document.getElementById('picker').style.display  = 'none';
    document.getElementById('loading').style.display = 'flex';

    let bspBlobUrl;
    try {
      bspBlobUrl = await bspToBlobUrl(bspFile);
    } catch(err) {
      document.getElementById('loading').innerHTML =
        `<div style="color:#f55">Chyba čtení BSP: ${err.message}</div>`;
      return;
    }

    const hasLocalTex = window._localTexMap.size > 0;
    const texBase     = hasLocalTex ? LOCAL_PREFIX : '';

    try {
      await initEngine({
        canvas:          document.getElementById('c'),
        mapUrl:          bspBlobUrl,
        textureBase:     texBase,
        fallbackTexBase: '',   // zakáže fallback na file://
        mapName:         bspFile.name.replace(/\.bsp$/i, '').toUpperCase(),

        physicsConfig: {
          MOVE_SPEED:      280 * 0.02,
          TURN_SPEED:      2.5,
          LOOK_SPEED:      2.5,
          RETURN_SPEED:    5.0,
          GRAVITY:        -28.0,
          JUMP_SPEED:      3.0,
          TERMINAL_VEL:  -30.0,
          PLAYER_HEIGHT:  80 * 0.02,
          PLAYER_RADIUS:   0.28,
          PLAYER_MASS:     1.0,
          STEP_HEIGHT:     0.45,
          SLOPE_MAX_ANGLE: 50,
          SKIN_WIDTH:      0.02,
          GROUND_CHECK:    0.18,
          NUM_SIDE_RAYS:   8,
          NUM_SLOPE_RAYS:  4,
        },

        onProgress(pct) {
          document.getElementById('progress-fill').style.width = pct + '%';
        },
        onReady() {
          URL.revokeObjectURL(bspBlobUrl);
          const el = document.getElementById('loading');
          el.classList.add('hidden');
          setTimeout(() => el.remove(), 500);
        },
      });
    } catch(err) {
      console.error(err);
      document.getElementById('loading').innerHTML =
        `<div style="color:#f55">Chyba enginu: ${err.message}</div>`;
    }
  });
</script>

</body>
</html>
