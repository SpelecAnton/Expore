<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXPORE</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; color: #fff;
      font-family: "Share Tech Mono", monospace;
      font-size: 14px; gap: 16px; z-index: 100;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #progress-bar {
      width: 260px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: #fff; transition: width 0.2s;
    }

    #fade {
      position: fixed; inset: 0; background: #000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s; z-index: 50;
    }
    #fade.out { opacity: 1; }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading Map…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<div id="fade"></div>
<canvas id="c"></canvas>

<script type="module">
  import { initEngine } from 'https://spelecanton.github.io/Expore/javascript/engine.js';

  initEngine({
    canvas:      document.getElementById('c'),
    mapUrl:      'map.bsp',
    textureBase: 'textures/',
    mapName:     'MAP',

    // ── Physics (BSP brush collision) ──────────────────────────────────────
    // Units: Three.js (1 unit ≈ 50 Q3 units).
    physicsConfig: {
      // Movement
      MOVE_SPEED:      280 * 0.02,   // walk speed  (units/s)
      TURN_SPEED:      2.5,          // A/D turning (rad/s)
      LOOK_SPEED:      2.5,          // Q/E tilting (rad/s)
      RETURN_SPEED:    5.0,          // auto-level speed after Q/E (rad/s)

      // Gravity & jump
      GRAVITY:        -28.0,         // downward accel (units/s²)
      JUMP_SPEED:      3.0,          // jump initial velocity (units/s)
      TERMINAL_VEL:  -30.0,          // max fall speed (units/s)

      // Player shape (affects collision box)
      PLAYER_HEIGHT:  80 * 0.02,     // eye height above floor = 1.6 units
      PLAYER_RADIUS:   0.28,         // AABB half-width

      // Collision tuning
      STEP_HEIGHT:     0.45,         // max stair step height
      SLOPE_MAX_ANGLE: 50,           // steeper = wall, not floor (degrees)
      SKIN_WIDTH:      0.02,         // gap kept from surfaces
    },

    // ── Post-processing bloom ───────────────────────────────────────────────
    bloomStrength:  0.1,   // glow intensity
    bloomRadius:    0.4,   // glow spread
    bloomThreshold: 0.2,   // minimum brightness to bloom

    // ── Callbacks ──────────────────────────────────────────────────────────
    onProgress(pct) {
      document.getElementById('progress-fill').style.width = pct + '%';
    },
    onReady() {
      const el = document.getElementById('loading');
      el.classList.add('hidden');
      setTimeout(() => el.remove(), 500);
    },
  });
</script>

</body>
</html>
