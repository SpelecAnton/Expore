<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXPORE</title>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      color: #fff;
      font-family: "Share Tech Mono", monospace;
      font-size: 14px;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #progress-bar {
      width: 260px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: #fff;
      transition: width 0.2s;
    }

    #fade {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
      z-index: 50;
    }
    #fade.out { opacity: 1; }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading Map…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="fade"></div>

<canvas id="c"></canvas>

<script type="module">
  import { initEngine } from 'https://spelecanton.github.io/Expore/javascript/engine.js';

  initEngine({
    canvas:      document.getElementById('c'),
    mapUrl:      'map.bsp',
    textureBase: 'textures/',
    mapName:     'MAP',

    // ── Physics ────────────────────────────────────────────────────────────
    physicsConfig: {
      // Movement
      MOVE_SPEED:      280 * 0.02,  // units/s — horizontal movement speed
      TURN_SPEED:      2.5,         // rad/s   — left/right turn speed (A/D keys)
      LOOK_SPEED:      2.5,         // rad/s   — head tilt speed (Q/E keys)
      RETURN_SPEED:    5.0,         // rad/s   — how fast head returns to level after releasing Q/E

      // Gravity
      GRAVITY:        -28.0,        // units/s² — increase for faster fall
      JUMP_SPEED:      3.0,         // units/s  — initial vertical velocity on jump (Space)
      TERMINAL_VEL:  -30.0,         // units/s  — maximum fall speed (terminal velocity)

      // Player
      PLAYER_HEIGHT:  80 * 0.02,    // units — camera height above the floor
      PLAYER_RADIUS:   0.28,        // units — player capsule radius (XZ collision)
      PLAYER_MASS:     1.0,         // (reserved for future use)

      // Collision
      STEP_HEIGHT:     0.45,        // units — max stair/slope step the player can climb
      SLOPE_MAX_ANGLE: 50,          // degrees — steeper than this is treated as a wall
      SKIN_WIDTH:      0.02,        // units — small offset to prevent sinking into surfaces
      GROUND_CHECK:    0.18,        // units — ground raycast length below the player

      // Raycasting
      NUM_SIDE_RAYS:   10,           // number of horizontal collision rays around the player
      NUM_SLOPE_RAYS:  4,           // number of rays used for slope/stair detection below player
    },

    // ── Bloom ──────────────────────────────────────────────────────────────
    bloomStrength:  0.1,   // overall bloom intensity — higher = stronger glow
    bloomRadius:    0.4,   // bloom spread radius — higher = wider halo
    bloomThreshold: 0.2,   // brightness threshold — lower = more surfaces bloom

    // ── Callbacks ──────────────────────────────────────────────────────────
    onProgress(pct) {
      document.getElementById('progress-fill').style.width = pct + '%';
    },
    onReady() {
      const el = document.getElementById('loading');
      el.classList.add('hidden');
      setTimeout(() => el.remove(), 500);
    },
  });
</script>

</body>
</html>
