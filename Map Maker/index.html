<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXPORE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      color: #fff;
      font-family: "Share Tech Mono", monospace;
      font-size: 14px;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #progress-bar {
      width: 260px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: #fff;
      transition: width 0.2s;
    }

    #fade {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
      z-index: 50;
    }
    #fade.out { opacity: 1; }
  </style>
</head>
<body>

<div id="loading">
  <div>Loading Map…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="fade"></div>

<canvas id="c"></canvas>

<script type="module">
  import { initEngine } from 'https://spelecanton.github.io/Expore/javascript/engine.js';

  initEngine({
    canvas:      document.getElementById('c'),
    mapUrl:      'map.bsp',
    textureBase: 'textures/',
    mapName:     'MAP',

    physicsConfig: {
      // Movement
      MOVE_SPEED:      280 * 0.02,  // units/s
      TURN_SPEED:      2.5,         // rad/s
      LOOK_SPEED:      2.5,         // head tilt speed via Q/E
      RETURN_SPEED:    5.0,         // smooth return speed of head to level

      // Gravity
      GRAVITY:        -28.0,        // units/s² — increase for faster fall
      JUMP_SPEED:      3.0,         // initial vertical velocity on jump
      TERMINAL_VEL:  -30.0,         // terminal fall velocity

      // Player
      PLAYER_HEIGHT:  80 * 0.02,    // camera height above the floor
      PLAYER_RADIUS:   0.28,        // player capsule radius (XZ)
      PLAYER_MASS:     1.0,         // (reserved for future use)

      // Collision
      STEP_HEIGHT:     0.45,        // max stair/slope step height
      SLOPE_MAX_ANGLE: 50,          // max stair angle (°) — above this = wall
      SKIN_WIDTH:      0.02,        // small offset to prevent player from sinking into walls
      GROUND_CHECK:    0.18,        // ground raycast length below player

      // Raycast
      NUM_SIDE_RAYS:   8,           // number of side collision rays
      NUM_SLOPE_RAYS:  4,           // rays for slope detection below player
    },

    onProgress(pct) {
      document.getElementById('progress-fill').style.width = pct + '%';
    },
    onReady() {
      const el = document.getElementById('loading');
      el.classList.add('hidden');
      setTimeout(() => el.remove(), 500);
    },
  });
</script>

</body>
</html>
